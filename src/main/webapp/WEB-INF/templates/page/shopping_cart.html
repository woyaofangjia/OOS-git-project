<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>我的购物车</title>
    <link rel="icon" href="/img/page_icon.png"/>
    <link rel="stylesheet" href="/css/home_page/header_and_nav.css"/>
    <link rel="stylesheet" href="/css/shopping_cart/shopping_cart.css"/>
    <script src="/js/jquery-1.3.2.min.js"></script>
    <script src="/js/home/header_model_js.js"></script>
    <script src="/js/shopping_cart/shopping_cart.js"></script>
</head>
<body>
<header th:include="header :: copy"></header>
<div th:include="short_nav_show :: short_nav_show" class="short_nav_show"></div>
<nav th:include="my_nav :: my_nav" class="my_nav"></nav>
<div th:include="personal_nav :: personal_nav" class="personal_nav"></div>
<div class="top_content">
    <div class="publish_product_div">
        <!-- 地址信息区域 -->
        <div class="shipping_address" id="default_address">
            <span class="name_info" th:text="${userInformation.realname != null ? userInformation.realname : '未设置'}">未设置</span><img src="/img/pencil.jpg" class="pencil_icon" title="编辑收货地址"/><br/>
            <span class="address_info" th:text="${userInformation.dormitory != null ? userInformation.dormitory : '请完善您的收货地址信息'}">请完善您的收货地址信息</span><br/><br/>
            <span class="phone_info" th:text="${userInformation.phone != null ? userInformation.phone : '未设置'}">未设置</span><br/>
            <span class="is_default">默认地址</span>
        </div>
    </div>
    <div class="cart_content">
        <table>
            <tr class="table_head">
                <th colspan="4">商品信息</th>
                <th>商品金额</th>
                <th>商品数量</th>
                <th>总金额</th>
                <th>编辑</th>
            </tr>
            <!-- 动态渲染商品列表 -->
            <tr th:if="${list != null and not #lists.isEmpty(list)}" class="table_content" th:each="o:${list}" th:attr="data-sid=${o.sid}, data-stock=${o.level}">
                <td class="input_checkbox">
                    <input id="1" type="checkbox" checked="checked" name="checkbox" th:value="${o.sid}"/></td>
                <td class="show_img">
                    <img src="/img/home/feature_prodects/cont1.jpg" th:src="${o.image}" th:value="${o.sid}"
                         th:title="${o.name}"/></td>
                <td class="title" colspan="2"><span th:text="${o.name}">商品名称</span></td>
                <td class="cost">￥<span th:text="${o.price}">0.00</span>元</td>
                <td class="count"><span class="minus">-</span><span class="number" th:text="${o.quantity}">1</span><span class="add" th:classappend="${o.quantity >= o.level} ? 'disabled'"></span>
                </td>
                <td class="per_sum">￥<span th:with="sum=${o.price}*${o.quantity}" th:text="${sum}">0.00</span>元</td>
                <td class="delete_img"><img src="/img/delete_icon.jpg" th:value="${o.id}" class="deleteShopCar"/></td>
            </tr>
            <!-- 购物车为空时的提示 -->
            <tr th:unless="${list != null and not #lists.isEmpty(list)}">
                <td colspan="8" class="empty_cart">
                    <p>您的购物车还是空的，快去<a href="/">逛逛吧~</a></p>
                </td>
            </tr>
            <tr class="end_pay" th:if="${list != null and not #lists.isEmpty(list)}">
                <td class="is_all"><input id="all" type="checkbox" checked="checked"/>全选</td>
                <td class="space" colspan="3"></td>
                <td colspan="2" class="all_sum">总价：￥<span class="total_price">0.00</span>元</td>
                <td colspan="3" class="pay_button_div">
                    <button class="pay_button">结算</button>
                </td>
            </tr>
        </table>
    </div>
    <footer>
        <p>Copyright © 2017.Company name All rights reserved.<a href="/"></a></p>
    </footer>
</div>
</body>
</html>
