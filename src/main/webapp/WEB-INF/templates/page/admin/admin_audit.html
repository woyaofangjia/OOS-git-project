<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>审核管理</title>
    <link rel="icon" href="/img/page_icon.png"/>
    <link rel="stylesheet" href="/css/home_page/header_and_nav.css"/>
    <link rel="stylesheet" href="/css/admin/admin_audit.css"/>
    <script src="/js/jquery-1.3.2.min.js"></script>
    <script src="/js/home/header_model_js.js"></script>
    <script src="/js/admin/admin_audit.js"></script>
</head>
<body>
<header th:include="header :: copy"></header>
<div th:include="short_nav_show :: short_nav_show" class="short_nav_show"></div>
<nav th:include="my_nav :: my_nav" class="my_nav"></nav>
<div th:include="personal_nav :: personal_nav" class="personal_nav"></div>

<div class="temp_content">
    <div class="audit_title">
        <h2>商品审核管理</h2>
    </div>
    
    <div class="audit_tabs">
        <button class="tab_button active" onclick="showTab('pending')">待审核商品</button>
        <button class="tab_button" onclick="showTab('approved')">已审核商品</button>
        <button class="tab_button" onclick="showTab('rejected')">已拒绝商品</button>
    </div>
    
    <!-- 待审核商品列表 -->
    <div id="pending" class="tab_content">
        <div th:if="${pendingList != null and pendingList.size() > 0}">
            <div class="audit_product_list">
                <div class="audit_product_item" th:each="item : ${pendingList}">
                    <div class="product_info">
                        <div class="product_img">
                            <img th:src="${item.image}" alt="商品图片"/>
                        </div>
                        <div class="product_details">
                            <h3 th:text="${item.name}"></h3>
                            <p class="product_price">价格：<span th:text="'¥' + ${item.price}"></span></p>
                            <p class="product_remark" th:text="${item.remark}"></p>
                            <p class="product_user">发布用户ID：<span th:text="${item.uid}"></span></p>
                            <p class="product_time">发布时间：<span th:text="${item.modified}"></span></p>
                        </div>
                        <div class="audit_actions">
                            <button class="audit_approve" th:attr="data-id=${item.id}">审核通过</button>
                            <button class="audit_reject" th:attr="data-id=${item.id}">审核拒绝</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:unless="${pendingList != null and pendingList.size() > 0}" class="no_data">
            <p>暂无待审核商品</p>
        </div>
    </div>
    
    <!-- 已审核商品列表 -->
    <div id="approved" class="tab_content" style="display:none;">
        <div th:if="${approvedList != null and approvedList.size() > 0}">
            <div class="audit_product_list">
                <div class="audit_product_item" th:each="item : ${approvedList}">
                    <div class="product_info">
                        <div class="product_img">
                            <img th:src="${item.image}" alt="商品图片"/>
                        </div>
                        <div class="product_details">
                            <h3 th:text="${item.name}"></h3>
                            <p class="product_price">价格：<span th:text="'¥' + ${item.price}"></span></p>
                            <p class="product_remark" th:text="${item.remark}"></p>
                            <p class="product_user">发布用户ID：<span th:text="${item.uid}"></span></p>
                            <p class="product_time">发布时间：<span th:text="${item.modified}"></span></p>
                        </div>
                        <div class="audit_status">
                            <span class="status_approved">已通过</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:unless="${approvedList != null and approvedList.size() > 0}" class="no_data">
            <p>暂无已审核商品</p>
        </div>
    </div>
    
    <!-- 已拒绝商品列表 -->
    <div id="rejected" class="tab_content" style="display:none;">
        <div th:if="${rejectedList != null and rejectedList.size() > 0}">
            <div class="audit_product_list">
                <div class="audit_product_item" th:each="item : ${rejectedList}">
                    <div class="product_info">
                        <div class="product_img">
                            <img th:src="${item.image}" alt="商品图片"/>
                        </div>
                        <div class="product_details">
                            <h3 th:text="${item.name}"></h3>
                            <p class="product_price">价格：<span th:text="'¥' + ${item.price}"></span></p>
                            <p class="product_remark" th:text="${item.remark}"></p>
                            <p class="product_user">发布用户ID：<span th:text="${item.uid}"></span></p>
                            <p class="product_time">发布时间：<span th:text="${item.modified}"></span></p>
                        </div>
                        <div class="audit_status">
                            <span class="status_rejected">已拒绝</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:unless="${rejectedList != null and rejectedList.size() > 0}" class="no_data">
            <p>暂无已拒绝商品</p>
        </div>
    </div>
</div>

<footer>
    <p>Copyright © 2017.Company name All rights reserved.</p>
</footer>
</body>
</html>
